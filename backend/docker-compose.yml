services:

  # ─────────────────────────────────────────
  # API - PTIR Backend
  # ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ptir-api
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=ptir_db
      - DB_USER=ptir_user
      - DB_PASSWORD=ptir_pass
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ptir-network

  # ─────────────────────────────────────────
  # Base de Dados - PostgreSQL
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ptir-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ptir_db
      - POSTGRES_USER=ptir_user
      - POSTGRES_PASSWORD=ptir_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptir_user -d ptir_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ptir-network

# ─────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────
volumes:
  pgdata:

networks:
  ptir-network:
    driver: bridge
